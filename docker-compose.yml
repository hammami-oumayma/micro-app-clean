version: "3.9"

services:

  # ======== INFRASTRUCTURE ========
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  # ======== MICROSERVICES ========
  auth:
    build: ./auth
    container_name: auth
    ports:
      - "3001:3000"
    env_file:
      - ./auth/.env
    depends_on:
      - rabbitmq

  tickets:
    build: ./tickets
    container_name: tickets
    ports:
      - "3002:3000"
    env_file:
      - ./tickets/.env
    depends_on:
      - rabbitmq

  orders:
    build: ./orders
    container_name: orders
    ports:
      - "3003:3000"
    env_file:
      - ./orders/.env
    depends_on:
      - rabbitmq

  payments:
    build: ./payments
    container_name: payments
    ports:
      - "3004:3000"
    env_file:
      - ./payments/.env
    depends_on:
      - rabbitmq

  expiration:
    build: ./expiration
    container_name: expiration
    ports:
      - "3005:3000"
    env_file:
      - ./expiration/.env
    depends_on:
      - rabbitmq
      - redis

  # ======== FRONTEND ========
  client:
    build: ./client
    container_name: client
    ports:
      - "4000:80"
    depends_on:
      - auth
      - tickets
      - orders
      - payments